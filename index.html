<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guia de Corte MReis</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, Arial, sans-serif; background: #faf8f5; color: #1a1a1a; font-size: 15px; line-height: 1.5; }
header { background: #7a1020; color: white; padding: 14px 16px; position: -webkit-sticky; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 6px rgba(0,0,0,0.3); }

.logo { font-size: 20px; font-weight: 700; letter-spacing: 0.05em; }
.logo-sub { font-size: 11px; opacity: 0.75; letter-spacing: 0.1em; text-transform: uppercase; }
.contador { font-size: 12px; background: rgba(255,255,255,0.2); padding: 4px 10px; border-radius: 20px; }
.search-wrap { position: relative; }
#busca { width: 100%; padding: 9px 36px; border-radius: 8px; border: none; font-size: 15px; background: rgba(255,255,255,0.18); color: white; outline: none; -webkit-appearance: none; }
#busca::-webkit-input-placeholder { color: rgba(255,255,255,0.6); }
.ico-busca { position: absolute; left: 11px; top: 50%; margin-top: -9px; font-size: 16px; opacity: 0.7; }
#btn-limpar { position: absolute; right: 8px; top: 50%; margin-top: -12px; background: none; border: none; color: white; font-size: 18px; padding: 2px 6px; opacity: 0.8; display: none; cursor: pointer; }
.filtros { padding: 10px 14px; display: -webkit-flex; display: flex; gap: 7px; overflow-x: auto; background: #f0ece4; border-bottom: 1px solid #ddd8cf; -webkit-overflow-scrolling: touch; }
.filtros::-webkit-scrollbar { display: none; }
.fbtn { white-space: nowrap; padding: 6px 13px; border-radius: 20px; border: 1.5px solid #ccc; background: white; font-size: 13px; font-weight: 500; cursor: pointer; color: #555; }
.fbtn.ativo { background: #7a1020; border-color: #7a1020; color: white; }
.res-info { padding: 8px 16px; font-size: 13px; color: #666; border-bottom: 1px solid #ddd8cf; display: none; }
main { padding-bottom: 40px; }
.cat-header { padding: 12px 16px 6px; font-size: 11px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: #7a1020; border-top: 1px solid #ddd8cf; margin-top: 6px; background: #faf8f5; }
.card { border-bottom: 1px solid #e8e4dc; background: white; overflow: hidden; }
.card-header { padding: 13px 16px; display: -webkit-flex; display: flex; -webkit-align-items: center; align-items: center; -webkit-justify-content: space-between; justify-content: space-between; cursor: pointer; -webkit-tap-highlight-color: transparent; }
.card-nome { font-size: 15px; font-weight: 600; -webkit-flex: 1; flex: 1; padding-right: 10px; }
.tags { margin-top: 4px; }
.tag { display: inline-block; font-size: 11px; padding: 2px 7px; border-radius: 10px; background: #e8f0fe; border: 1px solid #c5d4f5; color: #1a4fa0; margin-right: 4px; margin-top: 2px; }
.tag.cor { background: #fce8e6; border-color: #f5c5c0; color: #8b1a1a; }
.chevron { font-size: 18px; color: #999; -webkit-transition: -webkit-transform 0.2s; transition: transform 0.2s; -webkit-flex-shrink: 0; flex-shrink: 0; }
.card.aberto .chevron { -webkit-transform: rotate(180deg); transform: rotate(180deg); }
.card-body { display: none; padding: 0 16px 16px; background: #f7f4f0; }
.card.aberto .card-body { display: block; }
.foto-box { margin-bottom: 12px; border-radius: 8px; overflow: hidden; border: 1px solid #ddd8cf; background: #ede9e0; min-height: 100px; display: -webkit-flex; display: flex; -webkit-align-items: center; align-items: center; -webkit-justify-content: center; justify-content: center; text-align: center; }
.foto-box img { width: 100%; display: block; }
.foto-ph { padding: 20px 16px; color: #888; font-size: 13px; }
.obs { background: #fff8e1; border-left: 3px solid #f5a623; padding: 9px 11px; border-radius: 0 6px 6px 0; font-size: 13px; color: #6b4c00; margin-bottom: 11px; line-height: 1.5; }
.tbl-title { font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: #888; margin-bottom: 5px; margin-top: 10px; }
table { width: 100%; border-collapse: collapse; font-size: 13px; border: 1px solid #ddd8cf; }
thead tr { background: #7a1020; color: white; }
thead th { padding: 7px 9px; text-align: left; font-weight: 600; font-size: 12px; }
thead th:nth-child(2) { text-align: center; }
tbody tr:nth-child(even) { background: #f0ece4; }
tbody tr:nth-child(odd) { background: white; }
tbody td { padding: 7px 9px; border-bottom: 1px solid #e8e4dc; vertical-align: top; }
tbody tr:last-child td { border-bottom: none; }
td:first-child { font-weight: 500; }
td:nth-child(2) { text-align: center; color: #666; white-space: nowrap; }
.vazio { padding: 50px 20px; text-align: center; color: #888; display: none; }
mark { background: #fff176; border-radius: 2px; padding: 0 1px; }
</style>
</head>

var catAtiva = "todas";
var buscaAtual = "";

function render(cat, busca) {
  var main = document.getElementById("main");
  var vazio = document.getElementById("vazio");
  var resInfo = document.getElementById("res-info");
  var contador = document.getElementById("contador");
  main.innerHTML = "";

  var termo = busca.toLowerCase().trim();
  var filtrados = [];
  for (var i = 0; i < P.length; i++) {
    var p = P[i];
    var matchCat = (cat === "todas" || p.c === cat);
    var matchBusca = true;
    if (termo) {
      matchBusca = false;
      if (p.n.toLowerCase().indexOf(termo) >= 0) matchBusca = true;
      if (!matchBusca && p.o && p.o.toLowerCase().indexOf(termo) >= 0) matchBusca = true;
      if (!matchBusca) {
        for (var j = 0; j < p.m.length; j++) {
          if (p.m[j][0].toLowerCase().indexOf(termo) >= 0) { matchBusca = true; break; }
        }
      }
    }
    if (matchCat && matchBusca) filtrados.push(p);
  }

  contador.textContent = filtrados.length + " produtos";

  if (filtrados.length === 0) {
    vazio.style.display = "block";
    resInfo.style.display = "none";
    return;
  }
  vazio.style.display = "none";

  if (termo) {
    resInfo.style.display = "block";
    resInfo.textContent = filtrados.length + " resultado(s) para \"" + busca + "\"";
  } else {
    resInfo.style.display = "none";
  }

  var grupos = {};
  for (var i = 0; i < filtrados.length; i++) {
    var c = filtrados[i].c;
    if (!grupos[c]) grupos[c] = [];
    grupos[c].push(filtrados[i]);
  }

  var catOrder = ["ajuste","almofada","barrigueira","boleteira","bolsa","cabresto","capa","cloche","ice","joelheira","liga","manta","protetor","skid","outros"];
  for (var ci = 0; ci < catOrder.length; ci++) {
    var cat2 = catOrder[ci];
    if (!grupos[cat2]) continue;
    var h = document.createElement("div");
    h.className = "cat-header";
    h.textContent = CATS[cat2] || cat2;
    main.appendChild(h);

    for (var pi = 0; pi < grupos[cat2].length; pi++) {
      var p = grupos[cat2][pi];
      var card = document.createElement("div");
      card.className = "card";

      var nomeHL = p.n;
      if (termo) {
        var re = new RegExp(termo.replace(/[-\/\\^$*+?.()|[\]{}]/g,"\\$&"), "gi");
        nomeHL = p.n.replace(re, function(m){ return "<mark>" + m + "</mark>"; });
      }

      var tagsHTML = "";
      if (p.t && p.t !== "--") tagsHTML += "<span class=\"tag\">" + p.t + "</span>";
      if (p.cor && p.cor !== "--") {
        var corCurta = p.cor.length > 35 ? p.cor.substring(0,33) + "..." : p.cor;
        tagsHTML += "<span class=\"tag cor\">" + corCurta + "</span>";
      }

      var fotoHTML = p.f
        ? "<div class=\"foto-box\"><img src=\"" + p.f + "\" alt=\"" + p.n + "\" onerror=\"this.parentNode.innerHTML='<div class=\\'foto-ph\\'>Sem foto</div>'\"></div>"
        : "<div class=\"foto-box\"><div class=\"foto-ph\">Sem foto — adicione o link da imagem</div></div>";

      var obsHTML = p.o ? "<div class=\"obs\">" + p.o + "</div>" : "";

      var linhas = "";
      for (var mi = 0; mi < p.m.length; mi++) {
        var row = p.m[mi];
        var mp = row[0];
        if (termo) {
          var re2 = new RegExp(termo.replace(/[-\/\\^$*+?.()|[\]{}]/g,"\\$&"), "gi");
          mp = mp.replace(re2, function(m){ return "<mark>" + m + "</mark>"; });
        }
        linhas += "<tr><td>" + mp + "</td><td>" + row[1] + "</td><td>" + row[2] + "</td></tr>";
      }

      card.innerHTML = "<div class=\"card-header\" onclick=\"toggleCard(this)\">" +
        "<div><div class=\"card-nome\">" + nomeHL + "</div><div class=\"tags\">" + tagsHTML + "</div></div>" +
        "<div class=\"chevron\">&#9662;</div></div>" +
        "<div class=\"card-body\">" +
        "<div class=\"tbl-title\">Materia Prima</div>" +
        "<table><thead><tr><th>Material</th><th>Qtd</th><th>Medida</th></tr></thead><tbody>" + linhas + "</tbody></table>" +
        obsHTML + fotoHTML + "</div>";

      main.appendChild(card);
    }
  }
}

function toggleCard(header) {
  var card = header.parentElement;
  if (card.className.indexOf("aberto") >= 0) {
    card.className = "card";
  } else {
    card.className = "card aberto";
  }
}

function filtrarCategoria(cat, btn) {
  catAtiva = cat;
  var btns = document.querySelectorAll(".fbtn");
  for (var i = 0; i < btns.length; i++) {
    if (btns[i].className.indexOf("ativo") >= 0) {
      btns[i].className = "fbtn";
    }
  }
  btn.className = "fbtn ativo";
  render(cat, buscaAtual);
  window.scrollTo(0, 0);
}

function limparBusca() {
  document.getElementById("busca").value = "";
  buscaAtual = "";
  document.getElementById("btn-limpar").style.display = "none";
  render(catAtiva, "");
}

document.getElementById("busca").addEventListener("input", function() {
  buscaAtual = this.value;
  document.getElementById("btn-limpar").style.display = buscaAtual ? "block" : "none";
  render(catAtiva, buscaAtual);
});

// Montar filtros
var filtrosEl = document.getElementById("filtros");
var btnTodas = document.createElement("button");
btnTodas.className = "fbtn ativo";
btnTodas.textContent = "Todas";
btnTodas.onclick = function(){ filtrarCategoria("todas", this); };
filtrosEl.appendChild(btnTodas);

var catLabels = [
  ["ajuste","Ajustes de Sela"],["almofada","Almofadas"],["barrigueira","Barrigueiras"],
  ["boleteira","Boleteiras"],["bolsa","Bolsas"],["cabresto","Cabrestos"],
  ["capa","Capas/Capuzes"],["cloche","Cloches"],["ice","Ices"],
  ["joelheira","Joelheiras"],["liga","Ligas"],["manta","Mantas"],
  ["protetor","Protetores"],["skid","Skid/Splint"],["outros","Outros"]
];
for (var i = 0; i < catLabels.length; i++) {
  (function(catId, catLabel){
    var b = document.createElement("button");
    b.className = "fbtn";
    b.textContent = catLabel;
    b.onclick = function(){ filtrarCategoria(catId, this); };
    filtrosEl.appendChild(b);
  })(catLabels[i][0], catLabels[i][1]);
}

render("todas", "");
</script>
